services:
  fastmcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastmcp-server
    ports:
      - "${FASTMCP_HOST_PORT:-8001}:8000"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - fastmcp
    restart: unless-stopped

volumes:
  n8n_data:
