services:
  fastmcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastmcp-server
    ports:
      - "${FASTMCP_HOST_PORT:-8001}:8000"
    environment:
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006
      # Optional: set this if Phoenix auth is enabled.
      # - PHOENIX_API_KEY=your-phoenix-api-key
      # Optional: needed when generate_traces=true or include_llm_judge=true.
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - mcpnet
    depends_on:
      - phoenix
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    ports:
      - "6006:6006"   # Phoenix UI
      - "4317:4317"   # OTLP gRPC collector
    environment:
      - PHOENIX_WORKING_DIR=/mnt/data
    volumes:
      - phoenix_data:/mnt/data   # PHOENIX_WORKING_DIR
    networks:
      - mcpnet
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    networks:
      - mcpnet
    environment:
      - N8N_HOST=otthon.nagymarton.hu
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false

      # OpenTelemetry trace-ek kuldese Phoenix-be (OTLP gRPC)
      - N8N_ENABLE_OTEL=1
      - N8N_OTEL_ENDPOINT=http://phoenix:4317
      - N8N_OTEL_SERVICE_NAME=n8n-workflow-raspi

    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - fastmcp
      - phoenix
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - mcpnet

volumes:
  n8n_data:
  redis_data:
  phoenix_data:
    driver: local

networks:
  mcpnet:
    driver: bridge